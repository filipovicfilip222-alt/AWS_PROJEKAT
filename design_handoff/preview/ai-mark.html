<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>AI brand mark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px 22px; background: hsl(var(--background)); font-family: var(--font-sans); color: hsl(var(--foreground)); display:flex; gap:24px; align-items:center; flex-wrap:wrap; }
  .row { display:flex; align-items:center; gap:12px; }
  .mark { width:40px; height:40px; border-radius:999px; display:inline-flex; align-items:center; justify-content:center; box-shadow: 0 4px 14px -2px hsl(220 13% 12% / .15); ring: 1px solid; background: linear-gradient(135deg, hsl(262 90% 56%), hsl(262 90% 66%) 55%, hsl(296 85% 64%)); }
  .mark svg { width:20px; height:20px; color:white; }
  .title { font-family: var(--font-display); font-size:18px; font-weight:500; letter-spacing:-0.012em; line-height:1.1; font-variation-settings:"opsz" 48, "SOFT" 30; margin:0; }
  .sub { font-size:10px; font-weight:600; letter-spacing:.16em; text-transform: uppercase; color: hsl(var(--muted-foreground)); margin-top:2px; }
  .big { width:88px; height:88px; }
  .big svg { width:44px; height:44px; }
</style></head><body>
<div class="row">
  <div class="mark big"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2 L13.2 9.4 L20.5 8 L15.6 13.2 L20.5 18.4 L13.2 17 L12 24 L10.8 17 L3.5 18.4 L8.4 13.2 L3.5 8 L10.8 9.4 Z"/></svg></div>
</div>
<div class="row">
  <div class="mark"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2 L13.2 9.4 L20.5 8 L15.6 13.2 L20.5 18.4 L13.2 17 L12 24 L10.8 17 L3.5 18.4 L8.4 13.2 L3.5 8 L10.8 9.4 Z"/></svg></div>
  <div>
    <div class="title">AI Tutor</div>
    <div class="sub">Powered by Claude</div>
  </div>
</div>
</body></html>
