<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Cards</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:18px 22px; background: hsl(var(--background)); font-family: var(--font-sans); color: hsl(var(--foreground)); }
  .grid { display:grid; grid-template-columns: 1fr 1fr; gap:14px; }
  .card { background: hsl(var(--card)); border:1px solid hsl(var(--border)); border-radius:12px; box-shadow: var(--shadow-card); padding:18px; display:flex; flex-direction:column; gap:10px; }
  .card.hover { box-shadow: var(--shadow-card-hover); border-color: hsl(var(--foreground) / .3); transform: translateY(-2px); }
  .title { font-family: var(--font-display); font-size:18px; font-weight:500; letter-spacing:-0.012em; line-height:1.2; font-variation-settings:"opsz" 24, "SOFT" 20; margin:0; }
  .meta { display:flex; gap:14px; font-size:12px; color: hsl(var(--muted-foreground)); }
  .meta .ico { display:inline-flex; align-items:center; gap:4px; }
  .row-bottom { display:flex; align-items:center; justify-content:space-between; padding-top:10px; border-top: 1px solid hsl(var(--border) / .6); margin-top:auto; }
  .badge { display:inline-flex; align-items:center; gap:4px; padding:2px 10px; border-radius:999px; font-size:11px; font-weight:500; border:1px solid; }
  .b-secondary { background: hsl(var(--secondary)); color: hsl(var(--secondary-foreground)); border-color:transparent; }
  .b-accent { background: hsl(var(--accent-muted)); color: hsl(var(--accent)); border-color: hsl(var(--accent) / .25); }
  .arrow { display:inline-flex; align-items:center; gap:4px; font-size:13px; font-weight:500; }
  svg { width:14px; height:14px; }
</style></head><body>
<div class="grid">
  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:8px;">
      <div>
        <div class="title">Algoritmi i strukture</div>
        <div style="font-size:12px; color: hsl(var(--muted-foreground)); margin-top:2px;">prof. dr Ana Marković</div>
      </div>
      <span class="badge b-accent">Q&amp;A</span>
    </div>
    <div class="meta">
      <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>2026-05-14</span>
      <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>09:00–10:30</span>
    </div>
    <div class="row-bottom">
      <span class="badge b-secondary">3 slota</span>
      <span class="arrow">Detalji <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg></span>
    </div>
  </div>

  <div class="card hover">
    <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:8px;">
      <div>
        <div class="title">Operativni sistemi</div>
        <div style="font-size:12px; color: hsl(var(--muted-foreground)); margin-top:2px;">prof. dr Marko Jovanović</div>
      </div>
      <span class="badge b-accent">Q&amp;A</span>
    </div>
    <div class="meta">
      <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>2026-05-16</span>
      <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>11:00–12:30</span>
    </div>
    <div class="row-bottom">
      <span class="badge b-secondary">5 slotova</span>
      <span class="arrow" style="gap:8px">Detalji <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg></span>
    </div>
  </div>
</div>
<div style="margin-top:10px; font-size:11px; color: hsl(var(--muted-foreground));">Resting · Hover (translateY -2, foreground/30 border, shadow-card-hover)</div>
</body></html>
