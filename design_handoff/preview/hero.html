<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Hero treatment</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:18px 22px; background: hsl(var(--background)); font-family: var(--font-sans); color: hsl(var(--foreground)); }
  .hero { position:relative; overflow:hidden; border-radius:16px; border:1px solid hsl(var(--border)); background: hsl(var(--foreground)); color: hsl(var(--background)); padding:24px 28px; box-shadow: var(--shadow-elevated); }
  .blob { position:absolute; border-radius:50%; filter: blur(60px); pointer-events:none; }
  .blob.a { top:-120px; right:-80px; width:280px; height:280px; background: hsl(var(--accent) / .35); }
  .blob.b { bottom:-120px; left:-60px; width:280px; height:280px; background: hsl(var(--primary) / .25); }
  .grid { position:absolute; inset:0; opacity:.06; background-image: linear-gradient(to right, hsl(var(--border) / .4) 1px, transparent 1px), linear-gradient(to bottom, hsl(var(--border) / .4) 1px, transparent 1px); background-size: 32px 32px; }
  .eyebrow { display:inline-flex; align-items:center; gap:6px; padding:4px 12px; border-radius:999px; background: hsl(0 0% 100% / .1); border:1px solid hsl(0 0% 100% / .15); font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:.08em; position:relative; }
  .eyebrow svg { width:12px; height:12px; }
  h1 { color: inherit; font-family: var(--font-display); font-size:36px; font-weight:500; letter-spacing:-0.012em; line-height:1.05; margin:14px 0 8px; font-variation-settings:"opsz" 96, "SOFT" 30; max-width:520px; position:relative; }
  p { color: hsl(0 0% 100% / .75); max-width:520px; font-size:14px; line-height:1.55; position:relative; }
</style></head><body>
<div class="hero">
  <div class="grid"></div>
  <div class="blob a"></div>
  <div class="blob b"></div>
  <span class="eyebrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.9 5.8a2 2 0 0 1-1.3 1.3L3 12l5.8 1.9a2 2 0 0 1 1.3 1.3L12 21l1.9-5.8a2 2 0 0 1 1.3-1.3L21 12l-5.8-1.9a2 2 0 0 1-1.3-1.3Z"/></svg>Sledeća konsultacija</span>
  <h1>Algoritmi i strukture podataka</h1>
  <p>sreda, 14. maj · 09:00–10:30 · prof. dr Ana Marković. Slot je tvoj — AI tutor je ostao ti na raspolaganju do termina.</p>
</div>
<div style="margin-top:10px; font-size:11px; color: hsl(var(--muted-foreground));">Hero pattern: dark foreground card · violet & blue radial blobs at 30%/25% alpha · 6% grid texture · Fraunces 36px headline.</div>
</body></html>
