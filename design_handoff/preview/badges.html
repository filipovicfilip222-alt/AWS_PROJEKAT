<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Badges</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:18px 22px; background: hsl(var(--background)); font-family: var(--font-sans); color: hsl(var(--foreground)); }
  .row { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; }
  .badge { display:inline-flex; align-items:center; gap:4px; padding:2px 10px; border-radius:999px; font-size:11px; font-weight:500; border:1px solid; line-height:1.4; }
  .b-default     { background: hsl(var(--primary)); color: hsl(var(--primary-foreground)); border-color: transparent; }
  .b-accent      { background: hsl(var(--accent-muted)); color: hsl(var(--accent)); border-color: hsl(var(--accent) / .25); }
  .b-secondary   { background: hsl(var(--secondary)); color: hsl(var(--secondary-foreground)); border-color: transparent; }
  .b-outline     { background: hsl(var(--card)); color: hsl(var(--foreground)); border-color: hsl(var(--border)); }
  .b-success     { background: hsl(var(--success) / .1); color: hsl(var(--success)); border-color: hsl(var(--success) / .25); }
  .b-warning     { background: hsl(var(--warning) / .1); color: hsl(var(--warning)); border-color: hsl(var(--warning) / .25); }
  .b-info        { background: hsl(var(--info) / .1); color: hsl(var(--info)); border-color: hsl(var(--info) / .25); }
  .b-destructive { background: hsl(var(--destructive) / .1); color: hsl(var(--destructive)); border-color: hsl(var(--destructive) / .25); }
  .lbl { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.08em; color: hsl(var(--muted-foreground)); margin:0 0 6px; }
</style></head><body>
<div class="lbl">Brand & neutral</div>
<div class="row">
  <span class="badge b-default">objavljen</span>
  <span class="badge b-accent">AI</span>
  <span class="badge b-secondary">3 slota</span>
  <span class="badge b-outline">2026-05-14</span>
</div>
<div class="lbl">Semantic</div>
<div class="row">
  <span class="badge b-success">Visoka pouzdanost</span>
  <span class="badge b-warning">Srednja pouzdanost</span>
  <span class="badge b-info">Hibridno poklapanje</span>
  <span class="badge b-destructive">Niska pouzdanost</span>
</div>
</body></html>
