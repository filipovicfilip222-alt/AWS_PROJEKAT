<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Stat cards</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:18px 22px; background: hsl(var(--background)); font-family: var(--font-sans); color: hsl(var(--foreground)); }
  .grid { display:grid; grid-template-columns: repeat(4, 1fr); gap:12px; }
  .card { background: hsl(var(--card)); border:1px solid hsl(var(--border)); border-radius:12px; box-shadow: var(--shadow-card); padding:18px; display:flex; flex-direction:column; gap:10px; min-height:0; }
  .head { display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .lbl { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.08em; color: hsl(var(--muted-foreground)); }
  .ico { width:32px; height:32px; border-radius:8px; display:inline-flex; align-items:center; justify-content:center; }
  .ico svg { width:16px; height:16px; }
  .ico.muted { background: hsl(var(--muted)); color: hsl(var(--muted-foreground)); }
  .ico.primary { background: hsl(var(--primary) / .1); color: hsl(var(--primary)); }
  .ico.accent { background: hsl(var(--accent-muted)); color: hsl(var(--accent)); }
  .ico.success { background: hsl(var(--success) / .1); color: hsl(var(--success)); }
  .val { font-size:30px; font-weight:600; letter-spacing:-0.02em; }
  .val.primary { color: hsl(var(--primary)); }
  .val.accent { color: hsl(var(--accent)); }
  .val.success { color: hsl(var(--success)); }
  .hint { font-size:11px; color: hsl(var(--muted-foreground)); }
</style></head><body>
<div class="grid">
  <div class="card">
    <div class="head"><span class="lbl">Termini ovog meseca</span><span class="ico muted"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></span></div>
    <div class="val">12</div>
    <div class="hint">Od toga 8 objavljenih</div>
  </div>
  <div class="card">
    <div class="head"><span class="lbl">Rezervacije</span><span class="ico primary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v13a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v13a3 3 0 0 1 3-3h7z"/></svg></span></div>
    <div class="val primary">38</div>
    <div class="hint">+6 ove nedelje</div>
  </div>
  <div class="card">
    <div class="head"><span class="lbl">AI pretrage</span><span class="ico accent"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.9 5.8a2 2 0 0 1-1.3 1.3L3 12l5.8 1.9a2 2 0 0 1 1.3 1.3L12 21l1.9-5.8a2 2 0 0 1 1.3-1.3L21 12l-5.8-1.9a2 2 0 0 1-1.3-1.3Z"/></svg></span></div>
    <div class="val accent">204</div>
    <div class="hint">Hibridno + tag</div>
  </div>
  <div class="card">
    <div class="head"><span class="lbl">"Jasno?" odobreno</span><span class="ico success"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 10v12"/><path d="M15 5.88 14 10h5.83a2 2 0 0 1 1.92 2.56l-2.33 8A2 2 0 0 1 17.5 22H7"/></svg></span></div>
    <div class="val success">87%</div>
    <div class="hint">Yes / no votes</div>
  </div>
</div>
</body></html>
