<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px 22px; background: hsl(var(--background)); font-family: var(--font-sans); color: hsl(var(--foreground)); display:flex; flex-direction:column; gap:18px; }
  .row { display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  .lockup { display:inline-flex; align-items:center; gap:8px; font-weight:600; font-size:16px; letter-spacing:-0.005em; }
  .badge { width:36px; height:36px; border-radius:8px; background: hsl(var(--foreground)); color: hsl(var(--background)); display:inline-flex; align-items:center; justify-content:center; box-shadow: var(--shadow-card); }
  .badge svg { width:16px; height:16px; }
  .badge.dark-on-light { background: hsl(var(--background)); color: hsl(var(--foreground)); border:1px solid hsl(var(--border)); }
  .nm { font-size:10px; color: hsl(var(--muted-foreground)); margin-top:6px; font-family: var(--font-mono); }
  .lockup .word { font-family: var(--font-sans); }
  .panel { padding:14px 16px; border-radius:12px; border:1px solid hsl(var(--border)); background: hsl(var(--card)); }
  .panel.dark { background: hsl(var(--foreground)); color: hsl(var(--background)); border-color: hsl(var(--foreground)); }
</style></head><body>
<div>
  <div class="row">
    <div class="panel"><div class="lockup">
      <span class="badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6"/><path d="M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg></span>
      <span class="word">PredZnanje</span>
    </div></div>
    <div class="panel dark"><div class="lockup">
      <span class="badge dark-on-light"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6"/><path d="M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg></span>
      <span class="word">PredZnanje</span>
    </div></div>
  </div>
  <div class="nm">Student lockup · GraduationCap mark · 36×36 rounded-md badge</div>
</div>
<div>
  <div class="row">
    <div class="panel"><div class="lockup">
      <span class="badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v13a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v13a3 3 0 0 1 3-3h7z"/></svg></span>
      <span class="word">PredZnanje</span>
    </div></div>
    <div class="panel dark"><div class="lockup">
      <span class="badge dark-on-light"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v13a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v13a3 3 0 0 1 3-3h7z"/></svg></span>
      <span class="word">PredZnanje</span>
    </div></div>
  </div>
  <div class="nm">Professor lockup · BookOpen mark · same chrome</div>
</div>
</body></html>
